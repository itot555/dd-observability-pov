apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
        tags.datadoghq.com/service: ${NAME_PREFIX}-py-back
        tags.datadoghq.com/env: ${NAME_PREFIX}
        tags.datadoghq.com/version: "1.0"
      annotations:
        # Datadog Agent にこのコンテナのログ収集設定を伝える（source: python でパイプライン自動適用）
        ad.datadoghq.com/python-app.logs: '[{"source":"python","service":"${NAME_PREFIX}-py-back"}]'
    spec:
      containers:
        - name: python-app
          image: ${PYTHON_IMAGE}
          ports:
            - containerPort: 8000
          env:
            - name: DD_SERVICE
              value: "${NAME_PREFIX}-py-back"
            - name: DD_ENV
              value: "${NAME_PREFIX}"
            - name: DD_VERSION
              value: "1.0"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: host
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: dbname
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
